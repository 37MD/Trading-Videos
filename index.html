<style>
@media(prefers-reduced-motion){*{animation:none!important;transition:none!important}}
:root{--bg:#dec09a;--surface:#b8925f;--card:#d4b896;--accent:#1a1a1a;--series-hl:#2c4a2e;--videos-hl:#1a2e4a;--wl-hl:#6b2d00;--text:#0d0d0d;--muted:#4a3828;--border:#9e7a52;--light:#e8d5b8;--lighter:#f0e6d0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);background-image:repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,0,0,0.016) 3px,rgba(0,0,0,0.016) 4px),repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.016) 3px,rgba(0,0,0,0.016) 4px);color:var(--text);min-height:100vh;overflow-x:hidden}
.app-header{background:var(--surface);border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:100;box-shadow:0 3px 14px rgba(0,0,0,0.22)}
.header-top{display:flex;align-items:center;padding:13px 16px 9px;gap:12px}
.play-icon{width:36px;height:36px;flex-shrink:0}
.app-title-wrap{flex:1}
.app-title{font-family:'DM Serif Display',serif;font-size:38px;letter-spacing:.5px;color:var(--text);line-height:1}
.app-subtitle{font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.tab-bar{display:flex;border-top:1px solid rgba(0,0,0,0.18)}
.tab-btn{flex:1;padding:10px 4px;background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;position:relative;transition:color .2s,background .2s;line-height:1.5;text-align:center}
.tab-btn.active{background:rgba(0,0,0,0.07)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:10%;width:80%;height:3px;border-radius:2px 2px 0 0}
.tab-btn.tab-series.active{color:var(--series-hl)}
.tab-btn.tab-series.active::after{background:var(--series-hl)}
.tab-btn.tab-videos.active{color:var(--videos-hl)}
.tab-btn.tab-videos.active::after{background:var(--videos-hl)}
.tab-btn.tab-watchlater.active{color:var(--wl-hl)}
.tab-btn.tab-watchlater.active::after{background:var(--wl-hl)}
.tab-icon{font-size:22px;display:block;margin-bottom:2px}
.wl-count{display:inline-block;background:var(--wl-hl);color:#fff;font-size:12px;min-width:20px;height:20px;line-height:20px;border-radius:10px;padding:0 6px;vertical-align:middle;margin-left:3px}
.app-body{max-width:960px;margin:0 auto;padding-bottom:80px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.section-banner{padding:14px 16px 10px;border-bottom:2px solid rgba(0,0,0,0.14);display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.07)}
.banner-title{font-family:'DM Serif Display',serif;font-size:32px;letter-spacing:.3px}
.banner-title.s{color:var(--series-hl)}
.banner-title.v{color:var(--videos-hl)}
.banner-title.w{color:var(--wl-hl)}
.banner-sub{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.banner-count{margin-left:auto;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.channel-group{border-bottom:1px solid rgba(0,0,0,0.11)}
.ch-header{display:flex;align-items:center;padding:11px 16px;cursor:pointer;user-select:none;gap:10px;transition:background .15s}
.ch-header:hover{background:rgba(0,0,0,0.06)}
.ch-badge{font-size:12px;font-weight:900;text-transform:uppercase;padding:3px 8px;border-radius:2px;letter-spacing:.1em;flex-shrink:0}
.badge-s{background:rgba(44,74,46,.12);color:var(--series-hl);border:1px solid var(--series-hl)}
.badge-v{background:rgba(26,46,74,.12);color:var(--videos-hl);border:1px solid var(--videos-hl)}
.badge-mr{background:rgba(0,0,0,.07);color:var(--text);border:1px solid var(--border)}
.ch-name{font-size:20px;flex:1;color:var(--text)}
.ch-lang{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.ch-arrow{color:var(--muted);font-size:15px;transition:transform .25s}
.channel-group.open .ch-arrow{transform:rotate(180deg)}
.feed-grid{display:none;padding:0 10px 10px;flex-direction:column;background:rgba(0,0,0,0.04)}
.channel-group.open .feed-grid{display:flex}
.feed-item{padding:10px 6px;border-bottom:1px solid rgba(0,0,0,0.07);display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:background .15s;border-radius:3px}
.feed-item:last-of-type{border-bottom:none}
.feed-item:hover{background:rgba(0,0,0,0.05)}
.item-thumb{width:150px;height:84px;object-fit:cover;flex-shrink:0;border-radius:3px;border:1px solid rgba(0,0,0,0.18);background:var(--card)}
.item-info{flex:1;min-width:0}
.item-title{font-size:18px;line-height:1.45;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-date{font-size:14px;color:var(--muted);margin-top:4px;letter-spacing:.07em;text-transform:uppercase}
.item-actions{display:flex;flex-direction:column;gap:5px;align-items:center;flex-shrink:0}
.btn-play{width:36px;height:36px;background:var(--accent);color:#fff;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:transform .15s,opacity .15s}
.btn-play:hover{transform:scale(1.1);opacity:.85}
.btn-wl{width:36px;height:36px;background:var(--lighter);color:var(--wl-hl);border:1px solid var(--wl-hl);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:background .15s}
.btn-wl:hover{background:#ffe0c8}
.btn-wl.saved{background:var(--wl-hl);color:#fff}
.loading-row{padding:18px 16px;text-align:center;font-size:15px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.spin{display:inline-block;animation:spin .8s linear infinite;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-row{padding:12px 16px;font-size:15px;color:#7a2020;text-align:center;letter-spacing:.08em}
.series-tool{margin:14px 12px;border:2px solid var(--accent);border-radius:3px;overflow:hidden;background:rgba(0,0,0,0.04)}
.series-tool-hdr{background:var(--accent);padding:9px 14px;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.13em;color:#fff}
.series-tool-body{padding:12px}
.stool-input{width:100%;padding:9px 11px;background:var(--lighter);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:18px;border-radius:3px;margin-bottom:9px;outline:none;transition:border-color .2s}
.stool-input:focus{border-color:var(--accent)}
.stool-input::placeholder{color:var(--muted)}
.stool-btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:900;text-transform:uppercase;letter-spacing:.11em;cursor:pointer}
.stool-btn:hover{opacity:.87}
.series-results{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.wl-empty{text-align:center;padding:50px 20px;font-size:20px;color:var(--muted)}
.wl-empty-icon{font-size:60px;display:block;margin-bottom:12px}
.wl-item{padding:12px 14px;border-bottom:1px solid rgba(0,0,0,0.1);display:flex;align-items:flex-start;gap:10px}
.wl-item:hover{background:rgba(0,0,0,0.04)}
.wl-thumb{width:144px;height:81px;object-fit:cover;flex-shrink:0;border-radius:3px;border:1px solid rgba(0,0,0,0.18);background:var(--card)}
.wl-info{flex:1;min-width:0}
.wl-title{font-size:18px;line-height:1.45;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wl-meta{font-size:14px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.wl-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.btn-wl-play{width:36px;height:36px;background:var(--accent);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.btn-wl-play:hover{opacity:.85}
.btn-wl-remove{width:36px;height:36px;background:var(--lighter);color:#7a2020;border:1px solid #7a2020;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.btn-wl-remove:hover{background:#ffe0d0}
.wl-clear-row{padding:12px 14px;border-top:2px solid rgba(0,0,0,0.12);text-align:right}
.btn-clear-all{background:none;border:2px solid #7a2020;color:#7a2020;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;padding:6px 14px;cursor:pointer;border-radius:3px}
.btn-clear-all:hover{background:#ffe0d0}
.load-more-wrap{text-align:center;padding:14px}
.btn-load-more{background:var(--lighter);border:2px solid var(--accent);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;padding:8px 20px;cursor:pointer;border-radius:3px;transition:background .2s}
.btn-load-more:hover{background:var(--card)}
#player-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;display:none;flex-direction:column}
#player-overlay.active{display:flex}
#player-overlay.portrait .player-wrap{padding-bottom:56.25%;flex-shrink:0;position:relative;width:100%;background:#000}
#player-overlay.portrait .player-info{flex:1;overflow-y:auto}
#player-overlay.landscape .player-wrap{flex:1;position:relative;padding-bottom:0;background:#000}
#player-overlay.landscape .player-info{display:none}
.btn-orientation{background:var(--lighter);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:6px 10px;cursor:pointer;border-radius:3px;flex-shrink:0;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.player-topbar{display:flex;align-items:center;padding:11px 14px;background:var(--surface);border-bottom:3px solid var(--accent);gap:10px;flex-shrink:0}
.btn-close{background:var(--accent);border:none;color:#fff;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:900;cursor:pointer;border-radius:3px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.player-ttl{font-size:17px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.btn-wl-player{background:var(--lighter);border:2px solid var(--wl-hl);color:var(--wl-hl);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:900;padding:6px 10px;cursor:pointer;border-radius:3px;flex-shrink:0;text-transform:uppercase;letter-spacing:.08em;transition:background .15s;white-space:nowrap}
.btn-wl-player:hover{background:#ffe0c8}
.btn-wl-player.saved{background:var(--wl-hl);color:#fff;border-color:var(--wl-hl)}
.btn-yt-open{background:var(--lighter);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:6px 10px;cursor:pointer;border-radius:3px;text-decoration:none;display:inline-flex;align-items:center;gap:3px;flex-shrink:0;text-transform:uppercase;letter-spacing:.07em}
.player-wrap{position:relative;width:100%;padding-bottom:56.25%;background:#000;flex-shrink:0}
.player-iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-info{padding:14px 16px;overflow-y:auto;flex:1;background:var(--surface)}
.player-info-title{font-family:'DM Serif Display',serif;font-size:27px;line-height:1.35;color:var(--text);margin-bottom:6px}
.player-info-meta{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.11em}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
#pwa-badge{position:fixed;bottom:20px;left:16px;z-index:1300;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:900;padding:9px 18px;border-radius:20px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,0.3);display:none;letter-spacing:.1em;text-transform:uppercase}
.thumb-placeholder{width:150px;height:84px;flex-shrink:0;border-radius:3px;border:1px solid rgba(0,0,0,0.18);background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:27px}
</style>
</head>

<div class="app-header">
  <div class="header-top">

      <div class="app-title">Trading</div>
      <div class="app-subtitle">Trading Channels · Indian Markets · Ad-Free</div>
    </div>

  <div class="tab-bar">
    <button class="tab-btn tab-series active" data-tab="series">
      <span class="tab-icon">🎬</span>YouTube Series
    </button>
    <button class="tab-btn tab-videos" data-tab="videos">
      <span class="tab-icon">📈</span>Trading Videos
    </button>
    <button class="tab-btn tab-watchlater" data-tab="watchlater">
      <span class="tab-icon">🕐</span>Watch Later<span class="wl-count" id="wl-count" style="display:none">0</span>
    </button>
  </div>
</div>
<div class="app-body">
  <div id="panel-series" class="tab-panel active">
    <div class="section-banner">
      <span style="font-size:20px">🎬</span>
      <div>
        <div class="banner-title s">YouTube Series</div>
        <div class="banner-sub">Short Films · Drama · Comedy</div>
      </div>
      <div class="banner-count">30 Channels</div>
    </div>
    <div class="series-tool">
      <div class="series-tool-hdr">🔍 Fetch Any Playlist / Channel Episodes</div>
      <div class="series-tool-body">
        <input class="stool-input" id="series-input" placeholder="Paste YouTube Playlist or Channel URL (list=…)" onkeydown="if(event.key==='Enter') App.fetchSeries()">
        <button class="stool-btn" onclick="App.fetchSeries()">▶ Fetch Episodes</button>
        <div id="series-results" class="series-results" style="display:none"></div>
      </div>
    </div>
    <div id="series-channels"></div>
  </div>
  <div id="panel-videos" class="tab-panel">
    <div class="section-banner">
      <span style="font-size:20px">📈</span>
      <div>
        <div class="banner-title v">Trading Videos</div>
        <div class="banner-sub">Indian Markets · Stock &amp; Index Trading</div>
      </div>
      <div class="banner-count">20 Channels</div>
    </div>
    <div id="video-channels"></div>
  </div>
  <div id="panel-watchlater" class="tab-panel">
    <div class="section-banner">
      <span style="font-size:20px">🕐</span>
      <div>
        <div class="banner-title w">Watch Later</div>
        <div class="banner-sub">Your saved videos</div>
      </div>
      <div class="banner-count" id="wl-banner-count">0 videos</div>
    </div>
    <div id="wl-list"></div>
  </div>
</div>
<div id="player-overlay">
  <div class="player-topbar">
    <button class="btn-close" onclick="Player.close()">✕ Close</button>
    <span class="player-ttl" id="p-title">Loading…</span>
    <button class="btn-orientation" id="p-orient-btn" onclick="Player.toggleOrientation()" title="Switch to Portrait">↻ Landscape</button>
    <button class="btn-wl-player" id="p-wl-btn" onclick="Player.toggleWL()">+ Watch Later</button>
    <a class="btn-yt-open" id="p-yt-link" href="#" target="_blank" rel="noopener noreferrer">↗ YouTube</a>
  </div>
  <div class="player-wrap">
    <iframe class="player-iframe" id="player-iframe" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
  </div>
  <div class="player-info">
    <div class="player-info-title" id="p-info-title"></div>
    <div class="player-info-meta" id="p-info-meta"></div>
  </div>
</div>
<div id="pwa-badge" onclick="App.pwaTriggerInstall()">⬇ Install App</div>

/* =====================================================================
   SANDBOX 2: FEED — RSS fetching with primary + fallback proxy
   ===================================================================== */
var Feed = (function() {
  var PRIMARY  = 'https://api.rss2json.com/v1/api.json?rss_url=';
  var FALLBACK = 'https://api.allorigins.win/get?url=';
  var BATCH    = 8;

  function getVid(url) {
    if (!url) return null;
    var m = url.match(/[?&]v=([A-Za-z0-9_-]{11})/) || url.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function thumbUrl(vid) {
    return vid ? 'https://img.youtube.com/vi/' + vid + '/mqdefault.jpg' : null;
  }

  function embedUrl(vid) {
    return 'https://www.youtube.com/embed/' + vid + '?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&showinfo=0&fs=1';
  }

  function fmtDate(s) {
    try { return new Date(s).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }
    catch(e) { return ''; }
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function parseXMLItems(xmlText) {
    var items = [], entryRegex = /<entry>([\s\S]*?)<\/entry>/g, m;
    while ((m = entryRegex.exec(xmlText)) !== null) {
      var block = m[1];
      var vidMatch   = block.match(/<yt:videoId>([^<]+)<\/yt:videoId>/);
      var titleMatch = block.match(/<title>([^<]*)<\/title>/);
      var pubMatch   = block.match(/<published>([^<]+)<\/published>/);
      var thumbMatch = block.match(/url="(https:\/\/i[^"]+)"/);
      if (vidMatch) {
        var vid = vidMatch[1].trim();
        items.push({
          link: 'https://www.youtube.com/watch?v=' + vid,
          title: titleMatch ? titleMatch[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>') : 'Untitled',
          pubDate: pubMatch ? pubMatch[1] : '',
          thumbnail: thumbMatch ? thumbMatch[1] : thumbUrl(vid)
        });
      }
    }
    return items;
  }

  function fetchFeed(feedUrl, onSuccess, onError) {
    var api = PRIMARY + encodeURIComponent(feedUrl);
    fetch(api)
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.status === 'ok' && d.items && d.items.length > 0) {
          var items = d.items.filter(function(i) { return i.link && getVid(i.link); });
          if (items.length > 0) { onSuccess(items); return; }
        }
        throw new Error('primary empty');
      })
      .catch(function() {
        var fb = FALLBACK + encodeURIComponent(feedUrl);
        fetch(fb)
          .then(function(r) { return r.json(); })
          .then(function(d) {
            var xml = d.contents || '';
            var items = parseXMLItems(xml);
            if (items.length > 0) { onSuccess(items); }
            else { onError('No videos found'); }
          })
          .catch(function(e) { onError(e.message || 'Network error'); });
      });
  }

  return { getVid: getVid, thumbUrl: thumbUrl, embedUrl: embedUrl, fmtDate: fmtDate, esc: esc, fetchFeed: fetchFeed, BATCH: BATCH };
})();

/* =====================================================================
   SANDBOX 3: STORAGE — Watch Later via localStorage
   ===================================================================== */
var Storage = (function() {
  var KEY = 'trading_wl';
  var _wl = [];

  function load() {
    try { _wl = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { _wl = []; }
    return _wl;
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(_wl)); } catch(e) {}
    return _wl;
  }

  function getAll() { return _wl; }

  function has(vid) { return _wl.some(function(v) { return v.vid === vid; }); }

  function add(item) {
    if (!has(item.vid)) { _wl.unshift(item); save(); }
    return _wl;
  }

  function remove(vid) {
    _wl = _wl.filter(function(v) { return v.vid !== vid; });
    save();
    return _wl;
  }

  function clear() {
    _wl = []; save();
    return _wl;
  }

  function count() { return _wl.length; }

  load();
  return { getAll: getAll, has: has, add: add, remove: remove, clear: clear, count: count, load: load };
})();

/* =====================================================================
   SANDBOX 4: PLAYER — YouTube embed overlay
   ===================================================================== */
var Player = (function() {
  var _vid = null, _item = null;
  var _isLandscape = true;
  var _fsGuard = false;   // prevents fullscreenchange -> close on intentional exit

  var overlay = document.getElementById('player-overlay');
  var iframe  = document.getElementById('player-iframe');
  var pTitle  = document.getElementById('p-title');
  var pInfo   = document.getElementById('p-info-title');
  var pMeta   = document.getElementById('p-info-meta');
  var pLink   = document.getElementById('p-yt-link');
  var pBtn    = document.getElementById('p-wl-btn');
  var pOrient = document.getElementById('p-orient-btn');

  /* ---- cross-browser fullscreen helpers ---- */
  function requestFS(el) {
    return (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
  }
  function exitFS() {
    return (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
  }
  function getFS() {
    return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
  }

  /* ---- orientation helpers ---- */
  function lockOrientation(landscape) {
    try {
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock(landscape ? 'landscape' : 'portrait').catch(function(){});
      }
    } catch(e) {}
  }
  function unlockOrientation() {
    try {
      if (screen.orientation && screen.orientation.unlock) { screen.orientation.unlock(); }
    } catch(e) {}
  }

  /* ---- fullscreen + orientation combo ---- */
  function enterFullscreenAndLock() {
    requestFS(iframe).then(function() {
      lockOrientation(true);
    }).catch(function(){});
  }
  function exitFullscreenAndUnlock() {
    if (getFS()) { exitFS().catch(function(){}); }
    unlockOrientation();
  }

  /* ---- UI state ---- */
  function setOrientation(landscape) {
    _isLandscape = landscape;
    overlay.classList.toggle('landscape', landscape);
    overlay.classList.toggle('portrait', !landscape);
    pOrient.textContent = landscape ? '↻ Landscape' : '↻ Portrait';
    pOrient.title = landscape ? 'Switch to Portrait' : 'Switch to Landscape';
  }

  /* ---- fullscreen-change sync ---- */
  function onFSChange() {
    if (_fsGuard) { _fsGuard = false; return; }
    if (!getFS() && overlay.classList.contains('active')) {
      close();
    }
  }
  document.addEventListener('fullscreenchange', onFSChange);
  document.addEventListener('webkitfullscreenchange', onFSChange);
  document.addEventListener('msfullscreenchange', onFSChange);

  function updateBtn() {
    if (!_vid) return;
    if (Storage.has(_vid)) {
      pBtn.textContent = '✓ Saved'; pBtn.classList.add('saved');
    } else {
      pBtn.textContent = '+ Watch Later'; pBtn.classList.remove('saved');
    }
  }

  function open(vid, title, date, feed, link) {
    _vid = vid;
    _item = {vid:vid, title:title, date:date, feed:feed};
    iframe.src = Feed.embedUrl(vid);
    pTitle.textContent = title;
    pInfo.textContent = title;
    pMeta.textContent = (feed||'') + (date ? ' · ' + date : '');
    pLink.href = link || ('https://www.youtube.com/watch?v=' + vid);
    updateBtn();
    setOrientation(true);
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    enterFullscreenAndLock();
  }

  function close() {
    overlay.classList.remove('active');
    iframe.src = '';
    document.body.style.overflow = '';
    exitFullscreenAndUnlock();
    _vid = null; _item = null;
  }

  function toggleOrientation() {
    if (_isLandscape) {
      _fsGuard = true;
      exitFullscreenAndUnlock();
      setOrientation(false);
    } else {
      setOrientation(true);
      enterFullscreenAndLock();
    }
  }

  function toggleWL() {
    if (!_vid || !_item) return;
    if (Storage.has(_vid)) { Storage.remove(_vid); }
    else { Storage.add(_item); }
    updateBtn();
    var wlBtn = document.querySelector('.btn-wl[data-vid="' + _vid + '"]');
    if (wlBtn) {
      wlBtn.classList.toggle('saved', Storage.has(_vid));
      wlBtn.title = Storage.has(_vid) ? 'Remove from Watch Later' : 'Watch Later';
    }
    UI.renderWL();
  }

  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') close(); });

  return { open: open, close: close, toggleWL: toggleWL, updateBtn: updateBtn, toggleOrientation: toggleOrientation };
})();

/* =====================================================================
   SANDBOX 5: UI — Rendering, tabs, templates

var UI = (function() {
  var loadedFeeds = {};

  /* ---- Tabs ---- */
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
    document.querySelector('.tab-btn.tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'watchlater') renderWL();
  }

  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { switchTab(this.getAttribute('data-tab')); });
  });

  /* ---- Watch Later ---- */
  function updateWLBade() {
    var n = Storage.count();
    var badge = document.getElementById('wl-count');
    var bannerCount = document.getElementById('wl-banner-count');
    if (n > 0) { badge.textContent = n; badge.style.display = 'inline-block'; }
    else { badge.style.display = 'none'; }
    if (bannerCount) bannerCount.textContent = n + ' video' + (n !== 1 ? 's' : '');
  }

  function renderWL() {
    var el = document.getElementById('wl-list');
    updateWLBade();
    if (Storage.count() === 0) {
      el.innerHTML = '<div class="wl-empty"><span class="wl-empty-icon">🕐</span>No saved videos yet.<br>Tap 🕐 on any video to save it here.</div>';
      return;
    }
    var html = '';
    Storage.getAll().forEach(function(v) {
      html +=
        '<div class="wl-item" id="wli-' + v.vid + '">' +
          '<img class="wl-thumb" src="' + Feed.esc(Feed.thumbUrl(v.vid)) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' +
          '<div class="wl-info">' +
            '<div class="wl-title">' + Feed.esc(v.title) + '</div>' +
            '<div class="wl-meta">' + Feed.esc(v.feed || '') + (v.date ? ' · ' + Feed.esc(v.date) : '') + '</div>' +
          '</div>' +
          '<div class="wl-actions">' +
            '<button class="btn-wl-play" data-vid="' + Feed.esc(v.vid) + '" data-title="' + Feed.esc(v.title).replace(/'/g,"&#39;") + '" data-date="' + Feed.esc(v.date) + '" data-feed="' + Feed.esc(v.feed||'') + '">▶</button>' +
            '<button class="btn-wl-remove" data-vid="' + Feed.esc(v.vid) + '" title="Remove">✕</button>' +
          '</div>' +
        '</div>';
    });
    html += '<div class="wl-clear-row"><button class="btn-clear-all" id="btn-clear-all">✕ Clear All</button></div>';
    el.innerHTML = html;

    el.querySelectorAll('.btn-wl-play').forEach(function(b) {
      b.addEventListener('click', function() {
        Player.open(this.getAttribute('data-vid'), this.getAttribute('data-title'), this.getAttribute('data-date'), this.getAttribute('data-feed'), 'https://www.youtube.com/watch?v=' + this.getAttribute('data-vid'));
      });
    });
    el.querySelectorAll('.btn-wl-remove').forEach(function(b) {
      b.addEventListener('click', function() {
        Storage.remove(this.getAttribute('data-vid'));
        renderWL();
      });
    });
    var clearBtn = el.querySelector('#btn-clear-all');
    if (clearBtn) {
      clearBtn.addEventListener('click', function() {
        if (Storage.count() === 0) return;
        if (confirm('Remove all ' + Storage.count() + ' saved videos?')) {
          Storage.clear();
          renderWL();
        }
      });
    }
  }

  /* ---- Channel Groups ---- */
  function buildGroup(ch, type, container) {
    var gid  = 'g-' + type + '-' + ch.name.replace(/\W+/g,'');
    var grid = 'f-' + type + '-' + ch.name.replace(/\W+/g,'');
    var isMarathi = ch.lang && ch.lang.toLowerCase().includes('marathi');
    var badgeCls  = type === 'series' ? 'badge-s' : (isMarathi ? 'badge-mr' : 'badge-v');

    var div = document.createElement('div');
    div.className = 'channel-group';
    div.id = gid;
    div.innerHTML =
      '<div class="ch-header">' +
        '<span class="ch-badge ' + badgeCls + '">' + Feed.esc(ch.lang) + '</span>' +
        '<span class="ch-name">' + Feed.esc(ch.name) + '</span>' +
        '<span class="ch-arrow">▼</span>' +
      '</div>' +
      '<div class="feed-grid" id="' + grid + '">' +
        '<div class="loading-row"><span class="spin">⟳</span> Loading…</div>' +
      '</div>';
    container.appendChild(div);

    div.querySelector('.ch-header').addEventListener('click', function() {
      toggleGroup(gid, grid, ch, type);
    });
  }

  function toggleGroup(gid, gridId, ch, type) {
    var grp  = document.getElementById(gid);
    var grid = document.getElementById(gridId);
    if (grp.classList.contains('open')) {
      grp.classList.remove('open'); return;
    }
    grp.classList.add('open');
    if (loadedFeeds[gridId]) return;
    loadedFeeds[gridId] = true;

    Feed.fetchFeed(
      Data.feedUrl(ch),
      function(items) { renderItems(grid, items, 0, Feed.BATCH, ch.name); },
      function(err)   { grid.innerHTML = '<div class="error-row">⚠ ' + Feed.esc(err) + ' — try again later</div>'; }
    );
  }

  function renderItems(grid, items, start, count, feedTitle) {
    var end = Math.min(start + count, items.length);
    for (var i = start; i < end; i++) {
      var it   = items[i];
      var vid  = Feed.getVid(it.link);
      if (!vid) continue;
      var thumb = Feed.thumbUrl(vid);
      var title = it.title || 'Untitled';
      var date  = Feed.fmtDate(it.pubDate || it.isoDate || '');
      var link  = it.link;
      var feed  = feedTitle || it.author || '';
      var inWL  = Storage.has(vid);

      var div = document.createElement('div');
      div.className = 'feed-item';
      div.setAttribute('data-vid', vid);
      div.setAttribute('data-title', title);
      div.setAttribute('data-date', date);
      div.setAttribute('data-feed', feed);
      div.setAttribute('data-link', link);

      var thumbHtml = thumb
        ? '<img class="item-thumb" src="' + Feed.esc(thumb) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
        : '<div class="thumb-placeholder">▶</div>';

      div.innerHTML =
        thumbHtml +
        '<div class="item-info">' +
          '<div class="item-title">' + Feed.esc(title) + '</div>' +
          '<div class="item-date">' + Feed.esc(date) + '</div>' +
        '</div>' +
        '<div class="item-actions">' +
          '<button class="btn-play">▶</button>' +
          '<button class="btn-wl' + (inWL ? ' saved' : '') + '" title="' + (inWL ? 'Remove from Watch Later' : 'Watch Later') + '">🕐</button>' +
        '</div>';

      grid.appendChild(div);
    }

    grid.addEventListener('click', function(e) {
      var target = e.target;
      if (target.classList.contains('btn-play')) {
        var item = target.closest('.feed-item');
        Player.open(item.getAttribute('data-vid'), item.getAttribute('data-title'), item.getAttribute('data-date'), item.getAttribute('data-feed'), item.getAttribute('data-link'));
        return;
      }
      if (target.classList.contains('btn-wl')) {
        var item = target.closest('.feed-item');
        var vid = item.getAttribute('data-vid');
        if (Storage.has(vid)) {
          Storage.remove(vid);
          target.classList.remove('saved');
          target.title = 'Watch Later';
        } else {
          Storage.add({
            vid: vid,
            title: item.getAttribute('data-title'),
            date: item.getAttribute('data-date'),
            feed: item.getAttribute('data-feed')
          });
          target.classList.add('saved');
          target.title = 'Remove from Watch Later';
        }
        renderWL();
        Player.updateBtn();
        return;
      }
      if (target.closest('.feed-item') && !target.closest('.item-actions')) {
        var playBtn = target.closest('.feed-item').querySelector('.btn-play');
        if (playBtn) playBtn.click();
      }
    });

    var old = grid.querySelector('.load-more-wrap');
    if (old) old.remove();
    if (end < items.length) {
      var wrap = document.createElement('div');
      wrap.className = 'load-more-wrap';
      var btn = document.createElement('button');
      btn.className = 'btn-load-more';
      btn.textContent = '▼ Show More (' + (items.length - end) + ' remaining)';
      btn.addEventListener('click', function() { renderItems(grid, items, end, count, feedTitle); });
      wrap.appendChild(btn);
      grid.appendChild(wrap);
    }
  }

  return { switchTab: switchTab, renderWL: renderWL, buildGroup: buildGroup, renderItems: renderItems };
})();

    'self.addEventListener("install",e=>{self.skipWaiting();e.waitUntil(caches.open(C).then(c=>c.addAll(["./"])))});' +
    'self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))).then(()=>self.clients.claim()))});' +
    'self.addEventListener("fetch",e=>{const u=e.request.url;' +
    'if(e.request.method!=="GET"||u.startsWith("chrome-extension")||u.startsWith("data:"))return;' +
    'if(u.includes("rss2json")||u.includes("allorigins")||u.includes("youtube.com")||u.includes("ytimg.com")||u.includes("googleapis")||u.includes("gstatic")){e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));return;}' +
    'e.respondWith(caches.match(e.request).then(c=>{if(c)return c;return fetch(e.request).then(r=>{if(r&&r.status===200&&r.type!=="opaque")caches.open(C).then(x=>x.put(e.request,r.clone()));return r;}).catch(()=>caches.match("./"))}));});';

  if ('serviceWorker' in navigator) {
    try {
      var b64 = btoa(unescape(encodeURIComponent(SW)));
      navigator.serviceWorker.register('data:application/javascript;base64,'+b64,{scope:'./'})
        .then(function(r){console.log('SW ok',r.scope);})
        .catch(function(e){console.info('SW skip:',e.message);});
    } catch(e){}
  }

  window._pwaPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    window._pwaPrompt = e;
    document.getElementById('pwa-badge').style.display = 'flex';
  });
  window.addEventListener('appinstalled', function(){ document.getElementById('pwa-badge').style.display = 'none'; });
})();
</script>
